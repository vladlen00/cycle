<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Трекер менструального цикла. Студия Ирены Пол.">
<title>Цикл</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400&display=swap">
<link rel="stylesheet" href="style.css">
<script src="telegram-web-app.js"></script>
</head>
<body>

<div class="app" hidden>
  <main class="app-main">
    <section class="screen is-active" data-screen="main">
      <div class="cycle-ring-wrap">
        <svg class="cycle-ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-track" cx="100" cy="100" r="86" fill="none"/>
          <circle class="ring-progress" cx="100" cy="100" r="86" fill="none"
                  stroke-dasharray="540.4" stroke-dashoffset="540.4"
                  transform="rotate(-90 100 100)"/>
        </svg>
        <div class="cycle-ring-center">
          <div class="cycle-day" id="cycle-day">--</div>
          <div class="cycle-phase" id="cycle-phase">--</div>
        </div>
      </div>
      <div class="cycle-prediction" id="cycle-prediction">--</div>
      <button class="btn-primary" data-action="open-record">Отметить менструацию</button>
    </section>

    <section class="screen" data-screen="calendar" hidden>
      <div class="calendar-list" id="calendar-list"></div>
    </section>

    <section class="screen" data-screen="history" hidden>
      <ul class="history-list" id="history-list"></ul>
      <div class="history-empty" id="history-empty" hidden>Здесь появятся твои циклы</div>
    </section>
  </main>

  <nav class="app-nav">
    <button class="nav-btn" data-nav="main" aria-current="page">Сегодня</button>
    <button class="nav-btn" data-nav="calendar">Календарь</button>
    <button class="nav-btn" data-nav="history">История</button>
  </nav>
</div>

<div class="modal" id="modal-record" hidden>
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title" id="record-title">Отметить менструацию</div>
    <form class="modal-form" id="form-record">
      <input type="hidden" name="id" value="">
      <label class="form-field">
        <span class="form-label">Дата начала</span>
        <input type="date" name="start_date" required>
      </label>
      <label class="form-field">
        <span class="form-label">Длительность (дней)</span>
        <input type="number" name="menstruation_length_days" min="1" max="14" value="5" required inputmode="numeric">
      </label>
      <label class="form-field">
        <span class="form-label">Заметки (необязательно)</span>
        <textarea name="notes" rows="2" maxlength="500"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" data-action="close-modal">Отмена</button>
        <button type="button" class="btn-danger" data-action="delete-record" hidden>Удалить</button>
        <button type="submit" class="btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-confirm" hidden>
  <div class="modal-backdrop" data-action="close-confirm"></div>
  <div class="modal-card modal-card-small">
    <div class="modal-title" id="confirm-title">Точно удалить?</div>
    <div class="modal-text" id="confirm-text">Эту запись нельзя будет вернуть.</div>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" data-action="close-confirm">Отмена</button>
      <button type="button" class="btn-danger" data-action="confirm-yes">Удалить</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="cycleCalc.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
